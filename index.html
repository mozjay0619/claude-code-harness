}

function handleTodoKeydown(event) {
  const ta = event.target;
  // TAB: indent (make sub-todo) / Shift+TAB: un-indent
  if (event.key === 'Tab' && !event.altKey && !event.ctrlKey && !event.metaKey) {
    event.preventDefault();
    event.stopPropagation();
    setTodoIndent(event.shiftKey ? 0 : 1);
    return;
  }
  if (event.metaKey && !event.shiftKey && event.key === 'Enter') {
    event.preventDefault();
    event.stopPropagation();
    todoOptEnter();
    return;
  }
  // Shift+Arrow Up/Down: multi-select todo rows
  if (!event.altKey && event.shiftKey && !event.ctrlKey && !event.metaKey &&
      (event.key === 'ArrowUp' || event.key === 'ArrowDown') &&
      ta.tagName === 'TEXTAREA' && isOnTodoPrimaryLine(ta)) {
    event.preventDefault();
    event.stopPropagation();
    multiSelectTodo(event.key === 'ArrowUp' ? -1 : 1);
    return;
  }
  // Opt+Arrow Up/Down: reorder todo slot (batch if multi-selected)
  if (event.altKey && !event.shiftKey && (event.key === 'ArrowUp' || event.key === 'ArrowDown')) {
    event.preventDefault();
    event.stopPropagation();
    reorderTodo(event.key === 'ArrowUp' ? -1 : 1);
    return;
  }
  // Plain Arrow Up/Down: navigate between todo rows at textarea boundaries
  if (!event.altKey && !event.ctrlKey && !event.metaKey && ta.tagName === 'TEXTAREA') {
    if (event.key === 'ArrowUp' && isAtFirstLine(ta)) {
      event.preventDefault();
      event.stopPropagation();
      navigateTodo(-1);
    } else if (event.key === 'ArrowDown' && isAtLastLine(ta)) {
      event.preventDefault();
      event.stopPropagation();
      navigateTodo(1);
    }
  }
}

function onBacklogFocus(idx) {
  if (_suppressFocusClear) {
    focusedZone = 'backlog';
    focusedIdx = idx;
    return;
  }
  selectedSet.clear();
  selectionAnchor = null;
  focusedZone = 'backlog';
  focusedIdx = idx;
  // Update visual focus indicators without full re-render
  document.querySelectorAll('.backlog-box').forEach(el => {
    el.classList.toggle('focused', parseInt(el.dataset.idx) === idx);
  });
  document.querySelectorAll('.inprogress-item').forEach(el => {
    el.classList.remove('focused');
  });
}

async function createEmptyBacklog(count = 1, sessionId = activeSession) {
  for (let i = 0; i < count; i++) {
    await api('POST', '/api/task', { prompt: '', session: sessionId });
  }
  await refresh();
}

async function ensureBacklogMinimumRows(sessionId = activeSession) {
  const deficit = MIN_BACKLOG_ROWS - tasksFor(sessionId, 'backlog').length;
  if (deficit <= 0) return false;
  await createEmptyBacklog(deficit, sessionId);
  return true;
}

function getPromptHistory() {
  // Returns previously pushed prompts for active session, newest first (LIFO)
  const pushed = state.tasks.filter(t =>
    t.session === activeSession && (t.state === 'in_progress' || t.state === 'done') && t.prompt.trim()
  );
  pushed.sort((a, b) => (b.started_at || '').localeCompare(a.started_at || ''));
  return pushed.map(t => t.prompt);
}

function browseHistory(direction) {
  // direction: -1 = older (Up), 1 = newer (Down)
  const history = getPromptHistory();
  if (history.length === 0) return false;
  // Stash original text when starting to browse
  if (historyIdx === -1 && direction === -1) {
    const blItems = tasksFor(activeSession, 'backlog');
    if (blItems[0]) {
      const ta = document.getElementById(`bl-${blItems[0].id}`);
      historyOriginalText = ta ? ta.value : '';
    }
  }
  const newIdx = historyIdx + (direction === -1 ? 1 : -1);
  if (newIdx < 0) {
    // Back to original text — restore
    historyIdx = -1;
    const blItems = tasksFor(activeSession, 'backlog');
    if (blItems[0]) {
      const ta = document.getElementById(`bl-${blItems[0].id}`);
      if (ta) { ta.value = historyOriginalText || ''; focusTextareaAtEnd(ta); }
    }
    historyOriginalText = null;
    return true;
  }
  if (newIdx >= history.length) return false;
  historyIdx = newIdx;
  const blItems = tasksFor(activeSession, 'backlog');
  if (blItems[0]) {
    const ta = document.getElementById(`bl-${blItems[0].id}`);
    if (ta) { ta.value = history[historyIdx]; focusTextareaAtEnd(ta); }
  }
  return true;
}

async function approveSession(event) {
  if (event) event.stopPropagation();
  if (!providerSupports('approval_ui')) {
    toast('Approval is not available for this session provider', true);
    return;
  }
  try {
    const res = await api('POST', `/api/session/${activeSession}/approve`);
    if (res.error) {
      toast('Approve failed: ' + res.error, true);
      await refresh();
      return;
    }
    toast('Plan approved');
    await refresh();
  } catch (err) {
    toast('Approve failed: ' + err.message, true);
  }
}

async function yesSession(event) {
  if (event) event.stopPropagation();
  if (!providerSupports('permission_ui')) {
    toast('Permission approval is not available for this session provider', true);
    return;
  }
  try {
    const res = await api('POST', `/api/session/${activeSession}/yes`);
    if (res.error) {
      toast('Permission approval failed: ' + res.error, true);

// ── Cmd+Shift+Enter multi-tap state ──
let cmdShiftEnterCount = 0;
let cmdShiftEnterTimer = null;

function cmdShiftEnterResolve(taps) {
  if (!providerSupports('plan')) {
    toast('Plan shortcuts are only available for Claude Code sessions', true);
    return;
  }
  // 1 tap = sonnet plan+exec, 2 taps = opus plan + sonnet exec, 3 taps = opus ultrathink, 4+ taps = opus team
  let params, label;
  if (taps >= 4)       { params = '?plan=1&model=opus&prefix=team';          label = 'team'; }
  else if (taps === 3) { params = '?plan=1&model=opus&prefix=ultrathink';    label = 'ultrathink'; }
  else if (taps === 2) { params = '?plan=1&model=opus&execmodel=sonnet';     label = 'opus→sonnet'; }
  else                 { params = '?plan=1&model=sonnet';                    label = 'sonnet'; }

  toast(`Sending (${label} mode)`);

  if (viewMode === 'tasks') handleCmdEnter(params);
  else if (viewMode === 'todo') todoOptEnter();
}

function getPushParams(overrideParams) {
  if (!providerSupports('plan')) return '';
  if (overrideParams) return overrideParams;
  return planMode ? '?plan=1' : '';
}

function cmdEnterTaskZone() {
  return focusedZone === 'ip' ? 'ip' : 'backlog';
}

async function handleCmdEnter(overrideParams) {
  const sessionId = activeSession;
  const zone = cmdEnterTaskZone();

  // Batch mode: if multi-selected, process all selected items
  if (selectedSet.size > 0) {
    const ipItems = tasksFor(sessionId, 'in_progress');
    const blItems = tasksFor(sessionId, 'backlog');
    const selectedIp = ipItems.filter(t => selectedSet.has(t.id));
    const selectedBl = blItems.filter(t => selectedSet.has(t.id));

    // Mark selected in-progress items as done (single commit for the batch)
    for (let i = 0; i < selectedIp.length; i++) {
      const isLast = i === selectedIp.length - 1;
      await api('POST', `/api/task/${selectedIp[i].id}/done${isLast ? '' : '?no_commit'}`);
    }
    // Send selected backlog items as a single concatenated in-progress task
    flushTextareaValues();
    if (selectedBl.length > 0) {
      const prompts = [];
      for (const t of selectedBl) {
        const ta = document.getElementById(`bl-${t.id}`);
        const prompt = ta ? ta.value.trim() : t.prompt.trim();
        if (prompt) prompts.push(prompt);
      }
      if (prompts.length > 0) {
        const combined = prompts.join('\n\n');
        const firstTask = selectedBl[0];
        await api('PUT', `/api/task/${firstTask.id}`, { prompt: combined });
        await api('POST', `/api/task/${firstTask.id}/start${getPushParams(overrideParams)}`);
        // Delete the remaining selected backlog tasks
        for (let i = 1; i < selectedBl.length; i++) {
          await api('DELETE', `/api/task/${selectedBl[i].id}`);
        }
      }
    }

    const count = selectedIp.length + selectedBl.length;
    selectedSet.clear();
    focusedZone = 'backlog'; focusedIdx = 0;
    await refresh();
    if (selectedBl.length > 0) await ensureBacklogMinimumRows(sessionId);
    if (selectedIp.length > 0) await autoGenerateTodoIfNeeded(sessionId);
    if (selectedBl.length > 0) {
      const ipSection = document.getElementById('inprogressSection');
      if (ipSection) ipSection.scrollTop = ipSection.scrollHeight;
    }
    toast(`${count} items processed`);
    return;
  }

  // Single item mode
  if (zone === 'ip') {
    const items = ipSorted(activeSession);
    if (items.length === 0) return;
    const task = items[focusedIdx];
    if (!task) return;
    await markDone(task.id);
    if (focusedIdx >= ipSorted(activeSession).length) {
      const bl = tasksFor(activeSession, 'backlog');
      if (bl.length > 0) { focusedZone = 'backlog'; focusedIdx = 0; }
      else if (ipSorted(activeSession).length > 0) { focusedIdx--; }
      else { focusedZone = 'backlog'; focusedIdx = 0; }
    }
    render();
  } else {
    await sendFocusedToPane(overrideParams);
  }
}

async function sendFocusedToPane(overrideParams) {
  try {
    const sessionId = activeSession;
    // Capture text from DOM before any re-render
    const domTexts = {};
    document.querySelectorAll('.backlog-box textarea').forEach(ta => {
      if (ta.dataset.taskId) domTexts[ta.dataset.taskId] = ta.value;
    });

    // Refresh state from server to ensure IDs are current
    state = await api('GET', '/api/state');

    const items = tasksFor(sessionId, 'backlog');
    if (items.length === 0) { toast('No backlog items', true); return; }
    if (focusedIdx >= items.length) focusedIdx = items.length - 1;
    const task = items[focusedIdx];
    if (!task) { toast('No task at index', true); return; }

    // Use DOM text if available (matched by position), otherwise server text
    const taskId = task.id;
    let prompt = domTexts[taskId] ? domTexts[taskId].trim() : '';
    // If DOM didn't have this ID (server restarted), try text by position
    if (!prompt) {
      const domKeys = Object.keys(domTexts);
      if (domKeys.length > focusedIdx) {
        prompt = domTexts[domKeys[focusedIdx]]?.trim() || '';
      }
    }
    if (!prompt) prompt = task.prompt.trim();
    if (!prompt) { toast('Empty prompt', true); return; }

    // Save prompt to server, then start
    clearTimeout(saveTimers[taskId]);
    const putRes = await api('PUT', `/api/task/${taskId}`, { prompt });
    if (putRes.error) { toast(`Save failed: ${putRes.error}`, true); return; }
    const res = await api('POST', `/api/task/${taskId}/start${getPushParams(overrideParams)}`);
    if (res.error) { toast(`Start failed: ${res.error}`, true); return; }

    toast(planMode ? 'Sent to In Progress (plan mode)' : 'Sent to In Progress');
    if (focusedIdx > 0) focusedIdx--;
    await refresh();
    await ensureBacklogMinimumRows(sessionId);
    const ipSection = document.getElementById('inprogressSection');
    if (ipSection) ipSection.scrollTop = ipSection.scrollHeight;
  } catch (err) {
    toast('Error: ' + err.message, true);
    console.error('sendFocusedToPane failed:', err);
  }
}

async function markDone(taskId) {
  await api('POST', `/api/task/${taskId}/done`);
  await refresh();
  toast('Done');
  await autoGenerateTodoIfNeeded(activeSession);
}

async function autoGenerateTodoIfNeeded(sessId) {
  const doneItems = tasksFor(sessId, 'done');
  if (doneItems.length < 3) return;
  const today = getTodayPacific();
  const todos = todosForDate(today);
  const hasTodo = todos.some(t => t.session === sessId && !t.done);
  if (hasTodo) return;
  let todoText = '';
  if (providerSupports('todo_name', sessId)) {
    // Ask the provider-specific backend to generate a short name when supported.
    const prompts = doneItems.map(t => t.prompt.trim());
    const res = await api('POST', '/api/generate-todo-name', {
      prompts,
      session: sessId,
      provider: sessionProvider(sessId),
    });
    todoText = res.name || '';
  }
  if (!todoText) todoText = 'Session ' + sessId + ' work';
  await api('POST', '/api/todo', { text: todoText, session: sessId });
  await refresh();
  toast(`Auto-created todo for Session ${sessId}`);
}

async function markFirstInProgressDone() {
  const items = ipSorted(activeSession);
  if (items.length === 0) return;
  await markDone(items[0].id);
}

async function deleteCurrentBacklog() {
  if (focusedZone !== 'backlog') return;
  flushTextareaValues();
  const items = tasksFor(activeSession, 'backlog');
  const task = items[focusedIdx];
  if (!task) return;
  if (items.length <= MIN_BACKLOG_ROWS) {
    if ((task.prompt || '') === '') return;
    await api('PUT', `/api/task/${task.id}`, { prompt: '' });
    task.prompt = '';
    await refresh();
    return;
  }
  await api('DELETE', `/api/task/${task.id}`);
  focusedIdx = Math.min(focusedIdx, items.length - 2);
  await refresh();
}

async function addNewBacklog() {
  const active = document.activeElement;
  const selection = active && active.tagName === 'TEXTAREA'
    ? { start: active.selectionStart, end: active.selectionEnd }
    : null;
  flushTextareaValues();
  const items = tasksFor(activeSession, 'backlog');
  const carriedTaskId = (focusedZone === 'backlog' && items[focusedIdx]) ? items[focusedIdx].id : null;
  const payload = { prompt: '', session: activeSession };
  if (carriedTaskId) payload.before_id = carriedTaskId;
  await api('POST', '/api/task', payload);
  await refresh();
  focusedZone = 'backlog';
  if (carriedTaskId) {
    const newItems = tasksFor(activeSession, 'backlog');
    const newIdx = newItems.findIndex(t => t.id === carriedTaskId);
    focusedIdx = newIdx >= 0 ? newIdx : 0;
  } else {
    focusedIdx = 0;
  }
  render();
  const list = document.getElementById('backlogList');
  const ta = list.querySelector(`textarea[data-idx="${focusedIdx}"]`);
  if (!ta) return;
  if (selection) {
    focusTextareaWithSelection(ta, selection.start, selection.end);
  } else {
    focusTextareaAtEnd(ta);
  }
}

async function changeSessionProvider(provider) {
  try {
    const res = await api('PUT', `/api/session/${activeSession}`, { provider });
    if (res.error) {
      toast(res.error, true);
      await refresh();
      return;
    }
    await refresh();
    const suffix = provider === 'codex'
      ? ` Start Codex in the pane with CC_HARNESS_SESSION=${activeSession} codex.`
      : '';
    toast(`Session ${activeSession} now uses ${res.provider_label || provider}.${suffix}`);
  } catch (err) {
    toast('Provider change failed: ' + err.message, true);
    await refresh();
  }
}

async function addSession() {
  const res = await api('POST', '/api/session');
  if (res.error) { toast(res.error, true); return; }
  await refresh();
  switchSession(res.id);
  toast(`Session ${res.id} created`);
}

async function deleteCurrentSession() {
  const ids = Object.keys(state.sessions).sort();
  if (ids.length <= 1) { toast('Cannot delete last session', true); return; }
  // Check if session has in-progress tasks
  const ip = tasksFor(activeSession, 'in_progress');
  if (ip.length > 0) { toast('Finish in-progress tasks first', true); return; }
  const res = await api('DELETE', `/api/session/${activeSession}`);
  if (res.error) { toast(res.error, true); return; }
  // Switch to the first remaining session
  await refresh();
  const remaining = Object.keys(state.sessions).sort();
  if (remaining.length > 0) switchSession(remaining[0]);
  toast('Session deleted');
}

async function pingCurrent() {
  const paneIdx = state.sessions[activeSession]?.pane_index;
  if (!paneIdx) return;
  await api('POST', `/api/ping/${paneIdx}`);
  toast(`Pinged pane ${paneIdx}`);
}

async function flushArchive() {
  const sessionId = activeSession;
  const res = await api('POST', '/api/flush', { session: sessionId });
  if (res.error) { toast(res.error, true); return; }
  focusedIdx = 0;
  selectedSet.clear();
  selectionAnchor = null;
  await refresh();
  if (!todoForSession(sessionId)) {
    delete sessionElapsed[sessionId];
    persistTimers();
    renderTabs();
    renderTimerDisplays();
  }
  toast(`Cleared ${res.count} tasks from session ${sessionId}`);
}

// Flush all textarea values into JS state + trigger server save
function isAtFirstLine(ta) {
  return ta.selectionStart === 0 || ta.value.lastIndexOf('\n', ta.selectionStart - 1) === -1;
}
function isAtLastLine(ta) {
  return ta.value.indexOf('\n', ta.selectionStart) === -1;
}

function isOnTodoPrimaryLine(ta) {
  return isAtFirstLine(ta);
}

function scrollFullyIntoView(el) {
  const prev = el.previousElementSibling;
  const next = el.nextElementSibling;
  if (prev) {
    prev.scrollIntoView({ block: 'nearest' });
  } else {
    const container = el.closest('.inprogress-section') || el.closest('.backlog-section');
    if (container) container.scrollTop = 0;
  }
  if (next) next.scrollIntoView({ block: 'nearest' });
  el.scrollIntoView({ block: 'nearest' });
}

async function interruptSession() {
  if (!providerSupports('interrupt')) {
    toast('Interrupt is not available for this session provider', true);
    return;
  }
  try {
    const res = await api('POST', `/api/session/${activeSession}/interrupt`);
    if (res.error) { toast(`Interrupt failed: ${res.error}`, true); return; }
    toast('Interrupted');
    await refresh();
  } catch (err) {
    toast('Interrupt error: ' + err.message, true);
  }
}

async function handleRewind() {
  if (!providerSupports('rewind')) {
    toast('Rewind is not available for this session provider', true);
    return;
  }
  if (rewindInProgress) return;
  const ipItems = ipSorted(activeSession);
  if (!ipItems.length || focusedIdx >= ipItems.length) return;

  // Everything from focused item onward gets rewound
  const tasksToRewind = ipItems.slice(focusedIdx);
  const totalTurns = tasksToRewind.reduce((sum, t) => sum + (t.turns || 0), 0);
  if (totalTurns === 0) {
    toast('No tracked turns to rewind', true);
    return;
  }

  rewindInProgress = true;
  toast(`Rewinding ${tasksToRewind.length} item(s), ${totalTurns} turn(s)...`);
  try {
    const res = await api('POST', `/api/session/${activeSession}/rewind`, {
      task_ids: tasksToRewind.map(t => t.id),
      total_turns: totalTurns
    });
    if (res.error) { toast(`Rewind failed: ${res.error}`, true); return; }
    focusedZone = 'backlog';
    focusedIdx = 0;
    selectedSet.clear();
    selectionAnchor = null;
    await refresh();
    toast(`Rewound ${tasksToRewind.length} item(s) to backlog`);
  } catch (err) {
    toast('Rewind error: ' + err.message, true);
  } finally {
    rewindInProgress = false;
  }
}

function togglePlanMode() {
  if (!providerSupports('plan')) {
    toast('Plan mode is only available for Claude Code sessions', true);
    return;
  }
  planMode = !planMode;
  document.getElementById('planToggle').classList.toggle('active', planMode);
}

function selectIPItem(event, idx) {
  if (event && hasInProgressTextSelection()) return;
  selectedSet.clear();
  selectionAnchor = null;
  focusedZone = 'ip';
  focusedIdx = idx;
  render();
  const el = document.querySelector(`.inprogress-item[data-ip-idx="${idx}"]`);
  if (el) scrollFullyIntoView(el);
}

function flushTextareaValues() {
  document.querySelectorAll('.backlog-box textarea').forEach(ta => {
    const taskId = ta.dataset.taskId;
    if (!taskId) return;
    const task = state.tasks.find(t => t.id === taskId);
    if (task && task.prompt !== ta.value) {
      task.prompt = ta.value;
      clearTimeout(saveTimers[taskId]);
      api('PUT', `/api/task/${taskId}`, { prompt: ta.value });
    }
  });
  flushNotesValues();
}

function multiSelect(direction) {
  flushTextareaValues();
  const items = focusedZone === 'ip'
    ? ipSorted(activeSession)
    : tasksFor(activeSession, 'backlog');
  if (items.length === 0) return;

  // Set anchor on first Shift+Arrow press
  if (selectionAnchor === null) selectionAnchor = focusedIdx;

  const newIdx = focusedIdx + direction;
  if (newIdx < 0 || newIdx >= items.length) return;
  focusedIdx = newIdx;

  // Selection = range from anchor to cursor (inclusive), by ID
  selectedSet.clear();
  const lo = Math.min(selectionAnchor, focusedIdx);
  const hi = Math.max(selectionAnchor, focusedIdx);
  for (let i = lo; i <= hi; i++) {
    if (items[i]) selectedSet.add(items[i].id);
  }

  render();

  // Scroll the newly focused item into view
  if (focusedZone === 'ip') {
    const el = document.querySelector(`.inprogress-item[data-ip-idx="${focusedIdx}"]`);
    if (el) scrollFullyIntoView(el);
  } else {
    const ta = document.getElementById(`bl-${items[focusedIdx].id}`);
    if (ta) {
      suppressFocusClear();
      focusTextareaAtEnd(ta);
      const blEl = ta.closest('.backlog-item'); if (blEl) scrollFullyIntoView(blEl);
    }
  }
}

function navigateItems(direction) {
  flushTextareaValues();
  const ipItems = ipSorted(activeSession);
  const blItems = tasksFor(activeSession, 'backlog');

  // Clear multi-select if navigating (Option+Arrow without Shift)
  selectedSet.clear();

  if (direction === -1) {
    // Moving up
    if (focusedZone === 'backlog' && focusedIdx > 0) {
      focusedIdx--;
    } else if (focusedZone === 'backlog' && focusedIdx === 0 && ipItems.length > 0) {
      // Cross into in-progress (bottom of ip list)
      focusedZone = 'ip';
      focusedIdx = ipItems.length - 1;
    } else if (focusedZone === 'ip' && focusedIdx > 0) {
      focusedIdx--;
    }
    // else: already at top, do nothing
  } else {
    // Moving down
    if (focusedZone === 'ip' && focusedIdx < ipItems.length - 1) {
      focusedIdx++;
    } else if (focusedZone === 'ip' && focusedIdx === ipItems.length - 1 && blItems.length > 0) {
      // Cross into backlog (top of backlog list)
      focusedZone = 'backlog';
      focusedIdx = 0;
    } else if (focusedZone === 'backlog' && focusedIdx < blItems.length - 1) {
      focusedIdx++;
    }
    // else: already at bottom, do nothing
  }

  render();

  // Scroll the focused item into view
  if (focusedZone === 'ip') {
    const el = document.querySelector(`.inprogress-item[data-ip-idx="${focusedIdx}"]`);
    if (el) scrollFullyIntoView(el);
  } else if (focusedZone === 'backlog') {
    const ta = document.getElementById(`bl-${blItems[focusedIdx].id}`);
    if (ta) {
      focusTextareaAtEnd(ta);
      const blEl = ta.closest('.backlog-item'); if (blEl) scrollFullyIntoView(blEl);
    }
  }
}

function handleTaskKeydown(event) {
  // Tab key: insert 4 spaces in textarea instead of moving focus
  if (event.key === 'Tab' && !event.altKey && !event.ctrlKey && !event.metaKey) {
    event.preventDefault();
    const ta = event.target;
    if (ta.tagName === 'TEXTAREA') {
      const start = ta.selectionStart;
      const end = ta.selectionEnd;
      ta.value = ta.value.substring(0, start) + '    ' + ta.value.substring(end);
      ta.selectionStart = ta.selectionEnd = start + 4;
      ta.dispatchEvent(new Event('input', { bubbles: true }));
    }
    return;
  }
  // Backspace: delete 4 spaces (soft tab) if cursor is preceded by them
  if (event.key === 'Backspace' && !event.altKey && !event.ctrlKey && !event.metaKey) {
    const ta = event.target;
    if (ta.tagName === 'TEXTAREA' && ta.selectionStart === ta.selectionEnd) {
      const pos = ta.selectionStart;
      if (pos >= 4 && ta.value.substring(pos - 4, pos) === '    ') {
        event.preventDefault();
        ta.value = ta.value.substring(0, pos - 4) + ta.value.substring(pos);
        ta.selectionStart = ta.selectionEnd = pos - 4;
        ta.dispatchEvent(new Event('input', { bubbles: true }));
        return;
      }
    }
  }
  if (event.metaKey && !event.shiftKey && event.key === 'Enter') {
    event.preventDefault();
    event.stopPropagation();
    handleCmdEnter();
    return;
  }
  // Opt+Shift+Arrow Up/Down: multi-select backlog rows
  if (event.altKey && event.shiftKey && !event.ctrlKey && !event.metaKey && (event.key === 'ArrowUp' || event.key === 'ArrowDown')) {
    event.preventDefault();
    event.stopPropagation();
    multiSelect(event.key === 'ArrowUp' ? -1 : 1);
    return;
  }
  // Opt+Arrow Up/Down: reorder backlog slot, or browse history at top slot
  if (event.altKey && !event.shiftKey && (event.key === 'ArrowUp' || event.key === 'ArrowDown')) {
    event.preventDefault();
    event.stopPropagation();
    if (focusedZone === 'backlog' && focusedIdx === 0) {
      if (event.key === 'ArrowUp') { browseHistory(-1); return; }
      if (event.key === 'ArrowDown' && historyIdx >= 0) { browseHistory(1); return; }
    }
    reorderBacklog(event.key === 'ArrowUp' ? -1 : 1);
    return;
  }
  // Plain Arrow Up/Down: navigate between rows at textarea boundaries
  const ta = event.target;
  if (!event.altKey && !event.ctrlKey && !event.metaKey && ta.tagName === 'TEXTAREA') {
    if (event.key === 'ArrowUp' && isAtFirstLine(ta)) {
      event.preventDefault();
      event.stopPropagation();
      historyIdx = -1;
      selectedSet.clear();
      navigateItems(-1);
    } else if (event.key === 'ArrowDown' && isAtLastLine(ta)) {
      event.preventDefault();
      event.stopPropagation();
      historyIdx = -1;
      selectedSet.clear();
      navigateItems(1);
    }
  }
}

// ── Keyboard shortcuts ──
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && timeBlocksModalDate) {
    e.preventDefault();
    closeTimeBlocksModal();
    return;
  }

  // Cmd+Escape: rewind in-progress items back to backlog
  if (e.metaKey && e.key === 'Escape') {
    e.preventDefault();
    if (viewMode === 'tasks' && focusedZone === 'ip') {
      handleRewind();
    }
    return;
  }

  // Cmd+Delete: clear todo text and unset session (keep the row)
  if (e.metaKey && e.key === 'Backspace' && viewMode === 'todo') {
    e.preventDefault();
    clearTodoContent();
    return;
  }

  // Cmd+Enter (no shift): context-dependent push action
  if (e.metaKey && !e.shiftKey && e.key === 'Enter') {
    e.preventDefault();
    if (viewMode === 'tasks') handleCmdEnter();
    else if (viewMode === 'todo') todoOptEnter();
    return;
  }

  // Alt (Option) shortcuts
  if (e.altKey) {
    // Opt+Enter: new slot
    if (e.key === 'Enter') {
      e.preventDefault();
      if (viewMode === 'tasks') addNewBacklog();
      else if (viewMode === 'todo') addNewTodo();
      return;
    }

    // Opt+1 through Opt+6: switch session
    if (e.key >= '1' && e.key <= '6') {
      e.preventDefault();
      switchSession(e.key);
      return;
    }
    // Some keyboards send special chars for Opt+number, handle those too
    const optNumMap = {
      '\u00A1': '1', // Opt+1 on some layouts
      '\u2122': '2', // Opt+2
      '\u00A3': '3', // Opt+3
      '\u00A2': '4', // Opt+4
      '\u221E': '5', // Opt+5
      '\u00A7': '6', // Opt+6
    };
    if (optNumMap[e.key]) {
      e.preventDefault();
      switchSession(optNumMap[e.key]);
      return;
    }

    // Opt+Tab: toggle view (tasks <-> todo)
    if (e.key === 'Tab') {
      e.preventDefault();
      toggleView();
      return;
    }

    // Opt+Left/Right: switch session (tasks) or cycle todo session (todo)
    if (e.key === 'ArrowLeft') {
      e.preventDefault();
      if (viewMode === 'todo') cycleTodoSession(-1);
      else navigateSession(-1);
      return;
    }
    if (e.key === 'ArrowRight') {
      e.preventDefault();
      if (viewMode === 'todo') cycleTodoSession(1);
      else navigateSession(1);
      return;
    }

    // Opt+Shift+Up/Down: multi-select backlog rows only
    if (e.shiftKey && (e.key === 'ArrowUp' || e.key === 'ArrowDown') && viewMode === 'tasks' && focusedZone === 'backlog') {
      e.preventDefault();
      multiSelect(e.key === 'ArrowUp' ? -1 : 1);
      return;
    }

    // Opt+Up/Down: reorder current slot, or browse history at top backlog
    if (e.key === 'ArrowUp') {
      e.preventDefault();
      if (viewMode === 'tasks' && focusedZone === 'backlog' && focusedIdx === 0) { browseHistory(-1); return; }
      if (viewMode === 'todo') reorderTodo(-1);
      else reorderBacklog(-1);
      return;
    }
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      if (viewMode === 'tasks' && focusedZone === 'backlog' && focusedIdx === 0 && historyIdx >= 0) { browseHistory(1); return; }
      if (viewMode === 'todo') reorderTodo(1);
      else reorderBacklog(1);
      return;
    }

    // Opt+Backspace: delete current slot (backlog or todo)
    if (e.key === 'Backspace') {
      e.preventDefault();
      if (viewMode === 'todo') deleteTodo();
      else deleteCurrentBacklog();
      return;
    }
  }

  // Plain Enter: approve plan when focused on awaiting IP item
  if (!e.altKey && !e.ctrlKey && !e.metaKey && !e.shiftKey && e.key === 'Enter') {
    const active = document.activeElement;
    const inTextarea = active && active.tagName === 'TEXTAREA';
    if (!inTextarea && viewMode === 'tasks' && focusedZone === 'ip') {
      const sess = state.sessions[activeSession];
      const awaiting = sess?.awaiting_approval;
      const awaitingPerm = sess?.awaiting_permission;
      const ipItems = ipSorted(activeSession);
      if (focusedIdx === ipItems.length - 1) {
        if (awaiting) { e.preventDefault(); approveSession(); return; }
        if (awaitingPerm) { e.preventDefault(); yesSession(); return; }
      }
    }
  }

  // Shift+Arrow Up/Down: multi-select in-progress rows only
  if (!e.altKey && !e.ctrlKey && !e.metaKey && e.shiftKey && (e.key === 'ArrowUp' || e.key === 'ArrowDown')) {
    const active = document.activeElement;
    const inTextarea = active && active.tagName === 'TEXTAREA';
    if (!inTextarea && viewMode === 'tasks' && focusedZone === 'ip') {
      e.preventDefault();
      multiSelect(e.key === 'ArrowUp' ? -1 : 1);
      return;
    }
  }

  // Plain Arrow Up/Down: navigate rows when not editing a textarea
  if (!e.altKey && !e.ctrlKey && !e.metaKey && !e.shiftKey && (e.key === 'ArrowUp' || e.key === 'ArrowDown')) {
    const active = document.activeElement;
    const inTextarea = active && active.tagName === 'TEXTAREA';
    if (!inTextarea) {
      e.preventDefault();
      const dir = e.key === 'ArrowUp' ? -1 : 1;
      if (viewMode === 'tasks') {
        selectedSet.clear();
        selectionAnchor = null;
        navigateItems(dir);
      } else if (viewMode === 'todo') {
        navigateTodo(dir);
      }
    }
  }
});

// ── Refresh loop ──
async function refresh() {
  try {
    state = await api('GET', '/api/state');
    render();
  } catch (e) {}
}

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("/service-worker.js").catch((err) => {
      console.error("service worker registration failed", err);
    });
  });
}

// Initial load
(async () => {
  state = await api('GET', '/api/state');
  initTimersFromState();
  render();
  renderTimerDisplays();
})();
// Poll every second — never re-render backlog during poll (preserves textarea content)
setInterval(async () => {
  try {
    state = await api('GET', '/api/state');
    renderTabs();
    renderDone();
    if (!shouldPreserveInProgressSelection()) renderInProgress();
    renderTodoTimers();
    // Backlog is only re-rendered on explicit actions (add, delete, start, navigate)
  } catch (e) {}
}, 1000);
// Timer tick — runs every second, but accounts for real elapsed wall-clock time
setInterval(() => {
  if (!timerInitialized) return;
  const now = Date.now();
  let blockSyncTime = now;
  // Midnight reset (Pacific time)
  const today = new Date().toLocaleDateString('en-CA', {timeZone: 'America/Los_Angeles'});
  if (timerDate && timerDate !== today) {
    // Archive current day's total before resetting
    const dayTotal = totalTodoElapsedForDate(timerDate);
    if (dayTotal > 0) {
      api('POST', '/api/timers/history', { date: timerDate, total: dayTotal });
    }
    syncTimerActivityBlock(false, now);
    for (const sid in sessionElapsed) sessionElapsed[sid] = 0;
    todoSessionStart = {};
    unassignedMasterElapsed = 0;
    timerDate = today;
    timerPauseReason = null;
    timerBusyMode = false;
    resetTimerTick(now);
    persistTimers();
  }
  const activeTodo = todoForSession(activeSession);
  const tickStart = Number(lastTimerTickAt);
  if (!timerPaused() && Number.isFinite(tickStart) && tickStart <= now) {
    let deltaMs = 0;
    if (timerBusyMode) {
      deltaMs = now - tickStart;
    } else {
      if (now - lastActivityTime >= IDLE_AUTO_PAUSE_MS) { // 10 minutes
        deltaMs = lastActivityTime - tickStart;
        timerPauseReason = 'idle';
        blockSyncTime = lastActivityTime;
        persistTimers();
      } else {
        deltaMs = now - tickStart;
      }
    }
    applyTimerDelta(deltaMs, activeTodo);
  }
  resetTimerTick(now);
  syncTimerActivityBlock(timerShouldBeRunningNow(now), blockSyncTime);
  renderTabs();
  renderTimerDisplays();
}, 1000);
// Auto-save timers every 30 seconds
setInterval(() => {
  if (timerInitialized && Date.now() - lastTimerSave > 30000) persistTimers();
}, 30000);
</script>
